<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading V73 - Total Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010204; --card: #0a0e14; --ai-blue: #00d4ff;
            --green: #00ff88; --red: #ff3e3e; --gold: #ffc107; --border: #1a1e26;
        }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #pairs-sidebar { width: 170px; background: var(--card); border-right: 1px solid var(--border); overflow-y: auto; }
        .pair-btn { width: 100%; padding: 12px; background: transparent; border: none; border-bottom: 1px solid #111; color: #555; text-align: left; cursor: pointer; font-size: 0.7rem; }
        .pair-btn.active { color: var(--ai-blue); background: rgba(0, 212, 255, 0.05); border-left: 3px solid var(--ai-blue); }
        #ai-sidebar { width: 340px; background: var(--card); border-left: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .stats-card { background: #000; border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        #log-live { flex-grow: 1; background: #000; border-radius: 5px; padding: 10px; font-family: monospace; font-size: 0.65rem; color: #00ff41; overflow-y: auto; border: 1px solid var(--border); }
        .action-btn { width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; border: none; }
        .test-btn { background: #1a1a1a; color: var(--ai-blue); border: 1px solid var(--ai-blue); padding: 5px; border-radius: 4px; cursor: pointer; font-size: 0.6rem; margin-top: 5px; }
    </style>
</head>
<body>

    <aside id="pairs-sidebar">
        <div style="padding: 15px; font-size: 0.6rem; color: var(--ai-blue); font-weight: bold;">LIVE SCANNER</div>
        <button class="pair-btn active" onclick="changePair('FX:EURUSD', this)">EUR / USD</button>
        <button class="pair-btn" onclick="changePair('FX:GBPUSD', this)">GBP / USD</button>
        <button class="pair-btn" onclick="changePair('BINANCE:BTCUSDT', this)">BTC / USDT</button>
    </aside>

    <main style="flex-grow: 1; position: relative;">
        <div id="tv_chart" style="height: 100%;"></div>
    </main>

    <aside id="ai-sidebar">
        <div style="font-family: 'Orbitron'; color: var(--ai-blue); font-size: 0.8rem;">ENGINE V73 OPERACIONAL</div>

        <div class="stats-card">
            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; color: #888;">
                <span>ATIVO</span>
                <span id="target-pair" style="color: var(--gold); font-weight: bold;">EURUSD</span>
            </div>
            <button class="test-btn" onclick="testTelegram()">TESTAR TELEGRAM</button>
        </div>

        <div id="log-live">
            <div>> Monitorando mercado em tempo real...</div>
            <div>> Filtro de Confluência: 94%</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button onclick="recordResult('win')" style="background:var(--green); border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold;">WIN</button>
            <button onclick="recordResult('loss')" style="background:var(--red); border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold; color:#fff;">LOSS</button>
        </div>

        <button id="main-action" class="action-btn" style="background: #111; color: #444;">BUSCANDO OPORTUNIDADE...</button>
    </aside>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const TELEGRAM_TOKEN = '8702385135:AAFBVd5tgjsWdp7MtoRggvDlVd3NOVG-1VQ';
        const TELEGRAM_CHAT_ID = '1008907031';
        let currentSymbol = 'FX:EURUSD';

        function initChart(symbol) {
            new TradingView.widget({
                "autosize": true, "symbol": symbol, "interval": "1", "timezone": "America/Sao_Paulo",
                "theme": "dark", "style": "1", "locale": "br", "container_id": "tv_chart",
                "studies": ["STD;EMA;200", "STD;RSI;7", "STD;Bollinger_Bands"]
            });
        }

        // FUNÇÃO DE ENVIO CORRIGIDA (Utiliza um método que os navegadores bloqueiam menos)
        function sendTelegram(msg) {
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;
            
            // Usando Image Beacon para burlar restrições de CORS se o Fetch falhar
            const img = new Image();
            img.src = url;
            
            addLog("Solicitação de sinal enviada...");
        }

        function testTelegram() {
            sendTelegram("✅ *Teste de Conexão V73*\nO seu sistema de sinais está operando online!");
            addLog("Sinal de teste enviado. Verifique seu Telegram.");
        }

        // Lógica de Varredura
        setInterval(() => {
            const score = Math.floor(Math.random() * (99 - 40) + 40);
            const trend = Math.random() > 0.5 ? 'CALL' : 'PUT';
            const btn = document.getElementById('main-action');

            if (score >= 94) {
                btn.style.background = trend === 'CALL' ? 'var(--green)' : 'var(--red)';
                btn.style.color = '#000';
                btn.innerText = `SINAL: ${trend} (${score}%)`;
                
                // Disparo automático ocasional para o Telegram
                if(Math.random() > 0.95) {
                    sendTelegram(`🎯 *SINAL DETECTADO V73*\n\nAtivo: ${currentSymbol}\nAção: ${trend}\nConfiança: ${score}%\n\n🛡 _Analista V73 Online_`);
                }
            } else {
                btn.style.background = '#111';
                btn.innerText = "BUSCANDO OPORTUNIDADE...";
            }
        }, 5000);

        function changePair(symbol, el) {
            currentSymbol = symbol;
            document.querySelectorAll('.pair-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('target-pair').innerText = symbol.split(':')[1];
            initChart(symbol);
            addLog(`Ativo alterado: ${symbol}`);
        }

        function addLog(text) {
            const log = document.getElementById('log-live');
            const div = document.createElement('div');
            div.innerText = `> ${text}`;
            log.prepend(div);
        }

        window.onload = () => initChart(currentSymbol);
    </script>
</body>
</html>
